trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.5.7'

- task: TerraformTask@5
  displayName: Terraform Init
  inputs:
    provider: azurerm
    command: init
    backendServiceArm: 'devops 1'

- task: TerraformTask@5
  displayName: Terraform Validate
  inputs:
    provider: azurerm
    command: validate

- task: TerraformTask@5
  displayName: Terraform Plan
  inputs:
    provider: azurerm
    command: plan
    environmentServiceNameAzureRM: 'devops 1'

- task: TerraformTask@5
  displayName: Terraform Apply
  inputs:
    provider: azurerm
    command: apply
    environmentServiceNameAzureRM: 'devops 1'